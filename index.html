<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet">
   <link rel="stylesheet" href="/css/style.css" />
   <title>Unit Converter</title>
</head>

<body>
   <div id="container">
      <div id="inputs">
         <h1>Metric/Imperial Unit Conversion</h1>
         <input type="text" name="units" id="unit-input">
         <button id="convert-button">Convert</button>
      </div>
      <div id="conversions">
         <div id="length" class="units">
            <h2>Length (Meters/Feet)</h2>
            <p class="conversion"><span id="meters"></span>|<span id="feet"></span></p>
         </div>
         <div id="volume" class="units">
            <h2>Volume (Liters/Gallons)</h2>
            <p class="conversion"><span id="liters"></span>|<span id="gallons"></span></p>
         </div>
         <div id="mass" class="units">
            <h2>Mass (Kilograms/Pounds)</h2>
            <p class="conversion"><span id="kilograms"></span>|<span id="pounds"></span></p>
         </div>
      </div>
   </div>
   <script src="/script.js"></script>
</body>

</html>
